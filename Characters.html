<div class="characters-container">

 <section class="characters">

        <div class="filters">
        <select id="affiliation-filter" onchange="applyFilter()">
            <option id="option-filter" value="">All Nations</option>
            <option id="option-filter" value="Air Nomads">Air Nomads</option>
            <option id="option-filter" value="Water Tribe">Water Tribe</option>
            <option id="option-filter" value="Earth Kingdom">Earth Kingdom</option>
            <option id="option-filter" value="Fire Nation">Fire Nation</option>
        </select>
        </div>

        <div id="character-grid" class="character-grid"></div>

        <div class="pagination">
            <span onclick="prevPage()" class="arrow">←</span>
            <span id="page-number" class="page-number"></span>
            <span onclick="nextPage()" class="arrow">→</span>
        </div>

    </section>

    <div id="details"></div>
</div>

<div id="spotlight-overlay" class="spotlight-overlay" onclick="closeSpotlight(event)">
    <div class="spotlight-card" id="spotlight-card">
        <button class="close-btn" onclick="closeSpotlight(event)">x</button>
        <div id="spotlight-content"></div>
    </div>
</div>

<script>
    let allCharacters = [];
    let currentPage = 1;
    let perPage = 21;
    let selectedCharacter = null;
    let currentAffiliation = "";

    function findCharacter(id) {
        for (let c of allCharacters) {
            if (c._id === id) {
            return c;
            }
        }
    }

    function renderCharacters(){
        
        let result = document.querySelector('#character-grid');
        let html = '';

        for(let character of allCharacters){

            html += 
            `<div class="characterpage-card" id="card-${character._id}" onclick="openSpotlight('${character._id}')">
            <img src="${character.photoUrl}">
            <p>${character.name}</p>
            <div class="character-details" id="details-${character._id}"></div>
            </div>
            `;
            
        }
        result.innerHTML = html;
    }

    function openSpotlight(id) {
    const character = findCharacter(id);
    selectedCharacter = character;

    const overlay = document.getElementById("spotlight-overlay");
    const content = document.getElementById("spotlight-content");

    content.innerHTML = `
        <img src="${character.photoUrl}">
        <h2>${character.name}</h2>
        <p><b>Affiliation:</b> ${character.affiliation || "Unknown"}</p>
        <p><b>Allies:</b> ${(character.allies || []).join(", ") || "None"}</p>
        <p><b>Enemies:</b> ${(character.enemies || []).join(", ") || "None"}</p>
    `;

    overlay.classList.add("active");

    }

    function closeSpotlight(e) {
        if (e !== undefined && e !== null) {
            e.stopPropagation();
        }

    let overlay = document.getElementById("spotlight-overlay");
    overlay.classList.remove("active");
    }

    function applyFilter(){

    let select = document.getElementById("affiliation-filter");
    currentAffiliation = select.value;

    currentPage = 1;

    getData();
    }
    
    async function getData(){

        try{
            let url = `https://last-airbender-api.fly.dev/api/v1/characters?perPage=${perPage}&page=${currentPage}`;
        
            if(currentAffiliation !== ""){
                url += `&affiliation=${(currentAffiliation)}`;
        }

        const result = await fetch(url);
        const data = await result.json();

        allCharacters = data;
        
        renderCharacters();
        
        document.querySelector('#page-number').innerHTML = currentPage;
        }catch(error){
            console.log(error);
        }
    }

    function nextPage(){

        currentPage++;
        
        getData();

    }

    function prevPage(){

        if(currentPage > 1){

            currentPage--;

            getData();
        }
    }

    getData();
</script>
